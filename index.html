<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>চেতনার কোড | Chetana Publications</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%2300f3ff%22/></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Tiro+Bangla&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-accent: #00f3ff;
            --glass-bg: rgba(16, 21, 34, 0.75);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(rgba(0, 0, 30, 0.8), rgba(0, 0, 0, 0.95)), url('bg-image.jpg') center/cover no-repeat fixed;
        }

        /* Fancy Bengali Font */
        .bn-font { 
            font-family: 'Tiro Bangla', serif; 
            letter-spacing: 0.5px;
        }

        /* Main Wrapper to push footer down */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 1050px;
        }

        /* Stylish English Branding */
        .branding {
            text-align: center;
            margin-bottom: 2.5rem;
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        /* Glassmorphism Card */
        .book-showcase {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3.5rem;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 4rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            align-items: center;
        }

        /* Book Cover Image */
        .book-cover {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 243, 255, 0.15);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        
        .book-cover:hover {
            transform: scale(1.02) translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 243, 255, 0.3);
        }

        /* Book Details */
        .book-info h1 {
            font-size: 3.8rem;
            line-height: 1.2;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }

        .book-info h3 {
            font-size: 1.6rem;
            color: var(--neon-accent);
            margin-bottom: 1.5rem;
            font-weight: 400;
        }

        .book-description {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #cbd5e1;
            margin-bottom: 2.5rem;
        }

        /* Button Group */
        .actions {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.9rem 1.8rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--neon-accent);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        .btn-primary:hover {
            background: #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: #ffffff;
            border: 1px solid var(--glass-border);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--neon-accent);
            transform: translateY(-2px);
        }

        /* Professional Footer */
        footer {
            width: 100%;
            text-align: center;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid var(--glass-border);
            color: #94a3b8;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        footer span {
            color: var(--neon-accent);
        }

        /* Mobile Responsiveness */
        @media (max-width: 850px) {
            .branding { font-size: 2rem; }
            .book-showcase {
                grid-template-columns: 1fr;
                padding: 2.5rem;
                text-align: center;
                gap: 2rem;
            }
            .book-info h1 { font-size: 2.8rem; }
            .actions { justify-content: center; }
            .book-cover { max-width: 280px; margin: 0 auto; }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="container">
            <div class="branding">Chetana Publications</div>
            
            <div class="book-showcase">
                <div class="cover-wrapper">
                    <img src="book-cover.png" alt="চেতনার কোড Book Cover" class="book-cover">
                </div>

                <div class="book-info">
                    <h1 class="bn-font">চেতনার কোড</h1>
                    <h3 class="bn-font">লেখক: Abhik Dutta</h3>
                    
                    <p class="book-description bn-font">
                        একটি অসাধারণ যাত্রা যা মানুষের মন এবং ভবিষ্যতের অসীম সীমানাকে স্পর্শ করে। চেতনার গভীরে লুকিয়ে থাকা কোড ডিকোড করতে আজই পড়ুন।
                    </p>

                    <div class="actions">
                        <a href="chetanar-code.pdf" target="_blank" class="btn btn-primary">
                            <i class="fa-solid fa-book-open"></i> Read Now
                        </a>
                        
                        <a href="chetanar-code.pdf" download="Chetanar-Code-Abhik-Dutta.pdf" class="btn btn-outline">
                            <i class="fa-solid fa-download"></i> Download PDF
                        </a>

                        <button class="btn btn-outline" onclick="sharePage()">
                            <i class="fa-solid fa-share-nodes"></i> Share
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Chetana Publications. All rights reserved. | Designed by <span>Abhik Dutta</span></p>
    </footer>

    <script>
        function sharePage() {
            if (navigator.share) {
                navigator.share({
                    title: 'চেতনার কোড by Abhik Dutta',
                    text: 'Download and read "চেতনার কোড" from Chetana Publications!',
                    url: window.location.href
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link copied to clipboard!");
            }
        }
    </script>
</body>
</html>
