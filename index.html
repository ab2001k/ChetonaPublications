<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>চেতনার কোড | Chetana Publications</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%2300f3ff%22/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-accent: #00f3ff;
            --glass-bg: rgba(16, 21, 34, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Update 'bg-image.jpg' with your actual background image file */
            background: linear-gradient(rgba(0, 0, 50, 0.7), rgba(0, 0, 0, 0.9)), url('bg-image.jpg') center/cover no-repeat fixed;
        }

        .bn-font { font-family: 'Hind Siliguri', sans-serif; }

        .container {
            width: 90%;
            max-width: 1000px;
            padding: 2rem 0;
        }

        .branding {
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            font-size: 1.2rem;
            color: var(--neon-accent);
            text-transform: uppercase;
        }

        /* Glassmorphism Card */
        .book-showcase {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 3rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            align-items: center;
        }

        /* Book Cover Image */
        .book-cover {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.2);
            transition: transform 0.4s ease;
        }
        
        .book-cover:hover {
            transform: scale(1.03) translateY(-5px);
        }

        /* Book Details */
        .book-info h1 {
            font-size: 3.5rem;
            line-height: 1.2;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        .book-info h3 {
            font-size: 1.5rem;
            color: #a0aec0;
            margin-bottom: 1.5rem;
            font-weight: 400;
        }

        .book-description {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e2e8f0;
            margin-bottom: 2.5rem;
        }

        /* Button Group */
        .actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--neon-accent);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
        }

        .btn-primary:hover {
            background: #fff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: #fff;
            border: 1px solid var(--glass-border);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--neon-accent);
            transform: translateY(-2px);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .book-showcase {
                grid-template-columns: 1fr;
                padding: 2rem;
                text-align: center;
            }
            .book-info h1 { font-size: 2.5rem; }
            .actions { justify-content: center; }
            .book-cover { max-width: 300px; margin: 0 auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="branding">Chetana Publications</div>
        
        <div class="book-showcase">
            <div class="cover-wrapper">
                <img src="book-cover.png" alt="চেতনার কোড Book Cover" class="book-cover">
            </div>

            <div class="book-info">
                <h1 class="bn-font">চেতনার কোড</h1>
                <h3 class="bn-font">লেখক: Abhik Dutta</h3>
                
                <p class="book-description bn-font">
                    একটি অসাধারণ যাত্রা যা মানুষের মন এবং ভবিষ্যতের অসীম সীমানাকে স্পর্শ করে। চেতনার গভীরে লুকিয়ে থাকা কোড ডিকোড করতে আজই পড়ুন।
                </p>

                <div class="actions">
                    <a href="chetanar-code.pdf" target="_blank" class="btn btn-primary">
                        <i class="fa-solid fa-book-open"></i> Read Now
                    </a>
                    
                    <a href="chetanar-code.pdf" download="Chetanar-Code-Abhik-Dutta.pdf" class="btn btn-outline">
                        <i class="fa-solid fa-download"></i> Download PDF
                    </a>

                    <button class="btn btn-outline" onclick="sharePage()">
                        <i class="fa-solid fa-share-nodes"></i> Share
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function sharePage() {
            if (navigator.share) {
                navigator.share({
                    title: 'চেতনার কোড by Abhik Dutta',
                    text: 'Download and read "চেতনার কোড" from Chetana Publications!',
                    url: window.location.href
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link copied to clipboard!");
            }
        }
    </script>
</body>
</html>
